name: Android Debug APK Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x LightNovelLibrary/gradlew
      
    - name: Build debug APK
      run: |
        cd LightNovelLibrary
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: linovelib-debug-apk
        path: LightNovelLibrary/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: Get APK info
      run: |
        cd LightNovelLibrary
        APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f)
        if [ -n "$APK_PATH" ]; then
          echo "✅ APK built successfully:"
          ls -lh $APK_PATH
          APK_SIZE=$(du -h $APK_PATH | cut -f1)
          echo "📦 APK Size: $APK_SIZE"
        else
          echo "❌ No APK found"
          exit 1
        fi
